<title>ISEE NA 2026 — Conference Schedule</title>
<style>
:root{
  --navy:#1d3f5e; --teal:#5f9098; --teal-d:#3f6e75; --bg:#f4f6f7; --card:#fff;
  --ink:#1f2a30; --mut:#6b7b82; --line:#e2e8ea; --gold:#e8a93b; --chip:#eef3f3;
}
*{box-sizing:border-box}
html,body{margin:0; overflow-x:hidden; max-width:100%}
.ctitle,.ititle,.iid,.room,.chairs,.kname,.ksub{overflow-wrap:anywhere; word-break:break-word}
.iid{white-space:nowrap}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink); -webkit-text-size-adjust:100%; line-height:1.4}
a{color:var(--teal-d)}
header.top{background:linear-gradient(135deg,var(--navy),var(--teal-d)); color:#fff;
  padding:14px 16px calc(12px + env(safe-area-inset-top)); padding-top:calc(14px + env(safe-area-inset-top))}
header.top h1{margin:0; font-size:18px; letter-spacing:.2px}
header.top .sub{opacity:.85; font-size:12.5px; margin-top:3px}
.tabs{display:flex; gap:6px; margin-top:12px}
.tab{flex:1; text-align:center; padding:8px 6px; border-radius:10px; font-size:13px; font-weight:600;
  background:rgba(255,255,255,.14); color:#fff; cursor:pointer; user-select:none}
.tab.active{background:#fff; color:var(--navy)}
.wrap{max-width:880px; margin:0 auto; padding:12px 12px 60px}
.controls{position:sticky; top:0; z-index:20; background:var(--bg); padding:10px 0 6px}
.search{display:flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--line);
  border-radius:12px; padding:9px 12px; box-shadow:0 1px 2px rgba(0,0,0,.03)}
.search input{border:0; outline:0; font-size:16px; width:100%; background:transparent}
.search .ic{color:var(--mut); font-size:16px}
.daybar{display:flex; gap:6px; margin-top:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px}
.daybtn{white-space:nowrap; padding:7px 12px; border-radius:999px; border:1px solid var(--line);
  background:#fff; font-size:13px; font-weight:600; color:var(--ink); cursor:pointer}
.daybtn.active{background:var(--navy); color:#fff; border-color:var(--navy)}
.filtrow{display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; align-items:center}
select.fil{appearance:none; -webkit-appearance:none; background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%236b7b82'/></svg>") no-repeat right 10px center;
  border:1px solid var(--line); border-radius:10px; padding:7px 26px 7px 10px; font-size:13px; color:var(--ink); max-width:48%}
.favtgl{margin-left:auto; display:flex; align-items:center; gap:6px; font-size:13px; color:var(--mut); cursor:pointer; user-select:none}
.favtgl.on{color:var(--gold); font-weight:700}
.count{color:var(--mut); font-size:12.5px; margin:10px 2px 4px}
.daygroup{margin-top:6px}
.dayhd{font-size:13px; font-weight:800; color:var(--teal-d); text-transform:uppercase; letter-spacing:.6px; margin:16px 2px 6px}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; margin:10px 0; overflow:hidden;
  box-shadow:0 1px 3px rgba(20,40,50,.04)}
.card.event{background:#f7fafa; border-style:dashed}
.chd{padding:11px 13px; border-bottom:1px solid var(--line)}
.card.event .chd{border-bottom:0}
.chd .row1{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.badge{font-size:10.5px; font-weight:800; letter-spacing:.4px; text-transform:uppercase; padding:3px 7px; border-radius:6px}
.b-oral{background:#e4eff0; color:#2f6e74}
.b-light{background:#fdf0d9; color:#a9772a}
.b-poster{background:#e9e6f6; color:#5b4ba0}
.b-symp{background:#e2eef7; color:#2e5d86}
.b-plen{background:#e7f0e6; color:#3f7a47}
.b-sig{background:#f0e7ee; color:#8a4f78}
.b-event{background:#eceff0; color:#6b7b82}
.time{font-size:12.5px; font-weight:700; color:var(--navy)}
.room{font-size:12px; color:var(--mut)}
.room::before{content:"📍 "}
.pg{font-size:10.5px; color:#9aa8ad; margin-left:auto}
.ctitle{font-size:15px; font-weight:700; margin:6px 0 0; color:var(--ink)}
.chairs{font-size:11.5px; color:var(--mut); margin-top:2px}
.items{padding:3px 0}
.it{display:flex; gap:9px; padding:9px 13px; border-top:1px solid #f0f4f4; align-items:flex-start}
.it:first-child{border-top:0}
.star{flex:none; width:26px; height:26px; border-radius:8px; border:1px solid var(--line); background:#fff;
  color:#cbd5d8; font-size:15px; line-height:1; display:flex; align-items:center; justify-content:center; cursor:pointer; margin-top:1px}
.star.on{color:var(--gold); border-color:#f3d79a; background:#fffaf0}
.sstar{flex:none; margin-left:auto; width:28px; height:28px; border-radius:8px; border:1px solid var(--line); background:#fff;
  color:#cbd5d8; font-size:16px; display:flex; align-items:center; justify-content:center; cursor:pointer}
.sstar.on{color:var(--gold); border-color:#f3d79a; background:#fffaf0}
.imeta{min-width:0; flex:1}
.iid{font-size:10.5px; font-weight:800; color:var(--teal-d); font-family:ui-monospace,Menlo,monospace}
.ititle{font-size:13.5px; margin:1px 0 0}
.ipres{font-size:12px; color:var(--mut); font-style:italic; margin-top:1px}
.unc{display:inline-block; margin-left:5px; font-size:10px; color:#b98a2e; border:1px solid #ecd9ad; background:#fdf6e6; border-radius:5px; padding:0 4px; cursor:help; font-style:normal; vertical-align:middle}
.empty{text-align:center; color:var(--mut); padding:50px 20px; font-size:14px}
.info h2{font-size:16px; color:var(--navy); margin:18px 2px 8px}
.kcard{background:#fff; border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin:9px 0}
.kname{font-weight:800; font-size:14.5px; color:var(--navy)}
.krole{font-size:12.5px; color:var(--teal-d); font-weight:600; margin-top:2px}
.kaff{font-size:12px; color:var(--mut); font-style:italic}
.kbio{font-size:12.5px; color:#46555b; margin-top:6px}
.part{font-size:12.5px; margin-top:4px}
.part b{color:var(--ink)}
.venue{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font-size:13px}
.howto{margin:5px 0 12px; padding-left:20px} .howto li{margin:3px 0; font-size:12.5px}
.notice{background:#fdf6e6; color:#7a5b16; border-bottom:1px solid #ecd9ad; font-size:12px; line-height:1.4; padding:8px 14px; text-align:center}
.notice b{color:#6b4e12}
.toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:var(--navy); color:#fff;
  padding:10px 16px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:50}
.toast.show{opacity:.96}
.btn{display:inline-block; background:var(--teal-d); color:#fff; border:0; border-radius:10px; padding:9px 14px; font-size:13px; font-weight:600; cursor:pointer}
.hint{font-size:11.5px;color:var(--mut);margin:4px 2px 0}
@media(min-width:560px){ select.fil{max-width:230px} }
</style>

 to DC: Hill Day in Washington DC", "track": null, "room": null, "time": "12:00 PM - 2:00 PM", "page": null, "chairs": null, "items": [], "title": "Transportation from JHU to DC: Hill Day in Washington DC", "is_event": true, "display_type": "Transportation from JHU to DC: Hill Day in Washington DC", "fav_uid": "sess-day-4-12-00-pm-2-00-pm-transportation-from-jhu-to-dc-hill-day-in-washi"}, {"sid": "s060", "day": "DAY 4", "date": "Thursday, June 4th", "type": "Hill Day in Washington DC", "type_full": "Hill Day in Washington DC", "track": null, "room": null, "time": "12:30 PM - 7:00 PM", "page": null, "chairs": null, "items": [], "title": "Hill Day in Washington DC", "is_event": true, "display_type": "Hill Day in Washington DC", "fav_uid": "sess-day-4-12-30-pm-7-00-pm-hill-day-in-washington-dc"}], "keynotes": [{"name": "AMIRA AKER, PHD", "role": "Assistant Professor, Department of Epidemiology", "affiliation": "Boston University School of Public Health", "bio": "Dr. Aker is an Assistant Professor in the School of Public Health at Boston University. She is an environmental epidemiologist who applies interdisciplinary research to identify risks associated with exposures to contaminants of emerging concern. Her work is largely focused on integrating complex statistical models and community-based research with Indigenous communities."}, {"name": "JAMAJI C. NWANAJI-ENWEREM, MD, PHD, MPP", "role": "Assistant Professor, Emergency Medicine", "affiliation": "Perelman School of Medicine, University of Pennsylvania", "bio": "Dr. Nwanaji-Enwerem is an Emergency Medicine Physician and a Presidential Assistant Professor at the University of Pennsylvania. Much of his work leverages molecular health biomarkers to improve our understanding of how chemical, physical, and social environmental exposures impact human aging and health. His work also emphasizes the need for public policy solutions. As an advocate of health for all, he collaborates with international organizations and governments to drive impactful health solutions.He has served as a member of the White House Environmental Justice Advisory Council and Office of Public Engagement Roundtables on Clinical Innovation and Health Equity, and the WHO technical advisory group for the occupational burden of disease estimation."}, {"name": "HUAQING WANG, PHD, PLA, AICP", "role": "Assistant Professor, Department of Landscape Architecture and Environmental Planning", "affiliation": "Utah State University", "bio": "Dr. Wang is an Assistant Professor of Landscape Architecture and Environmental Planning at Utah State University. She is a licensed landscape architect and an AICP-certified planner whose work bridges environmental epidemiology, urban planning, and landscape design. Her research explores how the spatial morphology of urban greenspaces affects population health, using observational and experimental studies, spatial analysis, machine learning, and causal inference. Her work focuses on outcomes such as non-communicable diseases, birth outcomes, mental health, and heat-related health risks."}], "fireside_chats": [{"title": "COMMUNITY SCIENCE AND INNOVATION FOR ENVIRONMENTAL JUSTICE (CSI EJ) INITIATIVE", "location": "(BALTIMORE, MD)", "participants": [{"name": "Matthew Aubourg", "role": "PhD Student, Johns Hopkins Bloomberg School of Public Health"}, {"name": "Greg Sawtell", "role": "Co-President, Community of Curtis Bay Association; Zero Waste Just Transition Director, South Baltimore Community Land Trust (SBCLT)"}, {"name": "Carlos Sanchez", "role": "Youth Outreach Specialist, South Baltimore Community Land Trust (SBCLT)"}, {"name": "Christopher Heaney", "role": "Associate Professor, Johns Hopkins Bloomberg School of Public Health"}]}, {"title": "EAST SIDE PARKWAYS COALITION COMMUNITY MEMBERS", "location": "(BUFFALO, NY)", "participants": [{"name": "Sasha Chavez", "role": "PhD Student, University of Maryland"}, {"name": "Bradley Wales", "role": "Co-Secretary and Co-Founder, East Side Parkways Coalition; Clinical Assistant Professor, University at Buffalo"}, {"name": "Jennifer Roberts", "role": "Associate Professor, University of Maryland"}]}]}</script>
<script>
const DB = JSON.parse(document.getElementById('DATA').textContent);
const $ = s=>document.querySelector(s);
const LS={ get(k,f){try{return JSON.parse(localStorage.getItem(k))??f}catch(e){return f}}, set(k,v){localStorage.setItem(k,JSON.stringify(v))} };
let favItems = new Set(LS.get('isee_fav_items',[]));
let favSess  = new Set(LS.get('isee_fav_sess',[]));
function saveFavs(){ LS.set('isee_fav_items',[...favItems]); LS.set('isee_fav_sess',[...favSess]); }

const state={ view:'schedule', q:'', day:'', type:'', room:'', track:'', favOnly:false };

$('#ctitle').textContent = DB.meta.title;
$('#csub').innerHTML = DB.meta.venue+' · '+DB.meta.dates;

// build day bar
const daybar=$('#daybar');
function dayChip(val,label){ const b=document.createElement('div'); b.className='daybtn'+(state.day===val?' active':''); b.textContent=label; b.onclick=()=>{state.day=val; syncDayUI(); render()}; return b; }
function buildDays(){ daybar.innerHTML=''; daybar.appendChild(dayChip('','All days'));
  DB.days.forEach(d=>{ const short=d.date? d.date.split(',')[0]+' '+ (d.date.match(/\w+ \d+/)?d.date.match(/\w+ \d+/)[0].split(' ')[1]:'') : d.day;
    daybar.appendChild(dayChip(d.day, d.day.replace('DAY','Day')+(d.date?' · '+d.date.replace(/(\w+), (\w+) (\d+).*/,'$1'):''))); }); }
function syncDayUI(){ [...daybar.children].forEach((c,i)=>{ const val = i===0?'':DB.days[i-1].day; c.classList.toggle('active', val===state.day); }); }
buildDays();

// fill selects
function fill(sel,arr){ arr.forEach(v=>{ const o=document.createElement('option'); o.value=v; o.textContent=v.length>46?v.slice(0,44)+'…':v; sel.appendChild(o); }); }
fill($('#fType'), [...new Set(DB.sessions.map(s=>s.display_type))].sort());
fill($('#fRoom'), DB.rooms);
fill($('#fTrack'), DB.tracks);

$('#q').addEventListener('input', e=>{ state.q=e.target.value.trim().toLowerCase(); render(); });
$('#fType').onchange=e=>{state.type=e.target.value; render()};
$('#fRoom').onchange=e=>{state.room=e.target.value; render()};
$('#fTrack').onchange=e=>{state.track=e.target.value; render()};
$('#favOnly').onclick=()=>{ state.favOnly=!state.favOnly; $('#favOnly').classList.toggle('on',state.favOnly); $('#favOnly').textContent=(state.favOnly?'★':'☆')+' Starred only'; render(); };

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
  state.view=t.dataset.view; switchView();
});
function switchView(){
  const sched = state.view!=='info';
  $('#schedControls').style.display = state.view==='schedule'?'block':'none';
  $('#info').style.display = state.view==='info'?'block':'none';
  $('#list').style.display = state.view==='info'?'none':'block';
  $('#count').style.display = state.view==='info'?'none':'block';
  if(state.view==='info') renderInfo(); else render();
}

const badgeClass=t=>({'Oral Presentations':'b-oral','Lightning Talks':'b-light','Poster Discussions':'b-poster','Symposium':'b-symp','Plenary':'b-plen','Special Interest Group':'b-sig'}[t]||'b-event');

function matchText(s){
  if(!state.q) return true;
  const q=state.q;
  if((s.title||'').toLowerCase().includes(q)) return true;
  if((s.display_type||'').toLowerCase().includes(q)) return true;
  if((s.room||'').toLowerCase().includes(q)) return true;
  return s.items.some(it=> (it.title||'').toLowerCase().includes(q) || (it.presenter||'').toLowerCase().includes(q) || (it.id||'').toLowerCase().includes(q));
}
function visibleItems(s){
  let its=s.items.filter(it=> it.kind==='abstract'||it.kind==='talk');
  if(state.q){ const q=state.q; const sessionMatch=(s.title||'').toLowerCase().includes(q)||(s.room||'').toLowerCase().includes(q)||(s.display_type||'').toLowerCase().includes(q);
    if(!sessionMatch) its=its.filter(it=>(it.title||'').toLowerCase().includes(q)||(it.presenter||'').toLowerCase().includes(q)||(it.id||'').toLowerCase().includes(q)); }
  if((state.favOnly || state.view==='favorites') && !favSess.has(s.fav_uid)) its=its.filter(it=>favItems.has(it.uid));
  return its;
}

function render(){
  const L=$('#list'); L.innerHTML='';
  let sessions=DB.sessions.filter(s=>{
    if(state.view==='favorites'){ if(!favSess.has(s.fav_uid) && !s.items.some(it=>favItems.has(it.uid))) return false; }
    if(state.day && s.day!==state.day) return false;
    if(state.type && s.display_type!==state.type) return false;
    if(state.room && s.room!==state.room) return false;
    if(state.track && s.track!==state.track) return false;
    if(state.favOnly && !favSess.has(s.fav_uid) && !s.items.some(it=>favItems.has(it.uid))) return false;
    if(!matchText(s)) return false;
    return true;
  });
  let nT=0, lastDay=null;
  sessions.forEach(s=>{
    const its=visibleItems(s);
    const showCard = its.length>0 || (s.is_event) || favSess.has(s.fav_uid) || (!state.favOnly && state.view!=='favorites' && s.items.length===0);
    if(state.view==='favorites' && its.length===0 && !favSess.has(s.fav_uid)) return;
    if(state.favOnly && its.length===0 && !favSess.has(s.fav_uid)) return;
    if(!showCard) return;
    if(s.day!==lastDay){ lastDay=s.day; const h=document.createElement('div'); h.className='dayhd';
      const dd=DB.days.find(x=>x.day===s.day); h.textContent=(s.day.replace('DAY','Day'))+(dd&&dd.date?' — '+dd.date:''); L.appendChild(h); }
    nT+=its.length;
    L.appendChild(card(s,its));
  });
  $('#count').textContent = sessions.length? `${nT} presentation${nT!==1?'s':''} · ${sessions.length} session${sessions.length!==1?'s':''}` : '';
  if(!sessions.length){ L.innerHTML='<div class="empty">'+(state.view==='favorites'?'No favorites yet. Tap the ☆ on any session or talk to save it here.':'Nothing matches your filters.')+'</div>'; $('#count').textContent=''; }
}

function card(s,its){
  const c=document.createElement('div'); c.className='card'+(s.is_event?' event':'');
  const hd=document.createElement('div'); hd.className='chd';
  const r1=document.createElement('div'); r1.className='row1';
  if(s.time){ const t=document.createElement('span'); t.className='time'; t.textContent=s.time; r1.appendChild(t); }
  const b=document.createElement('span'); b.className='badge '+badgeClass(s.display_type); b.textContent=s.display_type; r1.appendChild(b);
  if(s.room){ const rm=document.createElement('span'); rm.className='room'; rm.textContent=s.room; r1.appendChild(rm); }
  if(!s.is_event){ const ss=document.createElement('span'); ss.className='sstar'+(favSess.has(s.fav_uid)?' on':''); ss.textContent=favSess.has(s.fav_uid)?'★':'☆';
    ss.title='Save whole session'; ss.onclick=()=>{ toggle(favSess,s.fav_uid); ss.classList.toggle('on'); ss.textContent=favSess.has(s.fav_uid)?'★':'☆'; saveFavs(); toast(favSess.has(s.fav_uid)?'Session saved':'Session removed'); if(state.view==='favorites'||state.favOnly) render(); }; r1.appendChild(ss); }
  hd.appendChild(r1);
  const tt=document.createElement('div'); tt.className='ctitle'; tt.textContent=s.title; hd.appendChild(tt);
  if(s.chairs){ const ch=document.createElement('div'); ch.className='chairs'; ch.textContent=s.chairs; hd.appendChild(ch); }
  c.appendChild(hd);
  if(its.length){ const box=document.createElement('div'); box.className='items';
    its.forEach(it=> box.appendChild(itemRow(it))); c.appendChild(box); }
  return c;
}
function itemRow(it){
  const row=document.createElement('div'); row.className='it';
  const st=document.createElement('div'); st.className='star'+(favItems.has(it.uid)?' on':''); st.textContent=favItems.has(it.uid)?'★':'☆';
  st.onclick=()=>{ toggle(favItems,it.uid); st.classList.toggle('on'); st.textContent=favItems.has(it.uid)?'★':'☆'; saveFavs(); toast(favItems.has(it.uid)?'Saved to favorites':'Removed'); if(state.view==='favorites'||state.favOnly) render(); };
  row.appendChild(st);
  const m=document.createElement('div'); m.className='imeta';
  if(it.id){ const id=document.createElement('span'); id.className='iid'; id.textContent=it.id+'  '; m.appendChild(id); }
  const ti=document.createElement('span'); ti.className='ititle'; ti.textContent=it.title||'';
  if(it.uncertain){ const u=document.createElement('span'); u.className='unc'; u.textContent='?'; u.title='Some characters were obscured by the PDF watermark — verify against the source page.'; ti.appendChild(u); }
  m.appendChild(ti);
  if(it.subtitle){ const sb=document.createElement('div'); sb.className='ipres'; sb.style.fontStyle='normal'; sb.textContent=it.subtitle; m.appendChild(sb); }
  if(it.presenter){ const p=document.createElement('div'); p.className='ipres'; p.textContent=it.presenter; m.appendChild(p); }
  row.appendChild(m);
  return row;
}
function toggle(set,v){ set.has(v)?set.delete(v):set.add(v); }

let toastT;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1400); }

function renderInfo(){
  const I=$('#info'); let h='';
  h+='<h2>📲 Install this app</h2><div class="venue">Add it to your home screen for a full-screen, app-like icon that works offline.<br><br>'
    +'<b>iPhone / iPad — use Safari</b><ol class="howto"><li>Open this page in <b>Safari</b>.</li><li>Tap the <b>Share</b> button (square with an up-arrow).</li><li>Tap <b>Add to Home Screen</b>, then <b>Add</b>.</li></ol>'
    +'<b>Android — use Chrome</b><ol class="howto"><li>Open this page in <b>Chrome</b>.</li><li>Tap the <b>⋮</b> menu (top-right).</li><li>Tap <b>Add to Home screen</b> / <b>Install app</b>, then confirm.</li></ol>'
    +'<span class="hint">Favorites are saved on each device. When the schedule is updated, the app refreshes on next open with a connection.</span></div>';
  h+='<h2>Keynote Speakers</h2>';
  DB.keynotes.forEach(k=>{ h+=`<div class="kcard"><div class="kname">${esc(k.name)}</div>${k.role?`<div class="krole">${esc(k.role)}</div>`:''}${k.affiliation?`<div class="kaff">${esc(k.affiliation)}</div>`:''}${k.bio?`<div class="kbio">${esc(k.bio)}</div>`:''}</div>`; });
  if(DB.fireside_chats.length){ h+='<h2>Fireside Chats</h2>';
    DB.fireside_chats.forEach(f=>{ h+=`<div class="kcard"><div class="kname">${esc(f.title)}</div>${f.location?`<div class="kaff">${esc(f.location)}</div>`:''}`;
      (f.participants||[]).forEach(p=> h+=`<div class="part"><b>${esc(p.name)}</b>${p.role?' — '+esc(p.role):''}</div>`); h+='</div>'; }); }
  h+='<h2>Venue</h2><div class="venue"><b>'+esc(DB.meta.venue)+'</b><br>'+esc(DB.meta.address)+'<br>'+esc(DB.meta.dates)+'</div>';
  h+=`<h2>About this data</h2><div class="venue"><b>Unofficial &amp; AI-generated.</b> This is not an official conference app. The schedule was transcribed from the conference flipbook (${DB.sessions.length} sessions, ${DB.meta.n_abstracts} presentations), independently verified, and reviewed — but although unlikely, errors are possible, so confirm details against the official program. Changes made to the official flipbook are not reflected here in real time.</div>`;
  I.innerHTML=h;
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

render();
</script>
<script>
if('serviceWorker' in navigator){ window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }
</script>
</body>
</html>
